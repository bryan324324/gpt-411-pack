<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>411 Pack</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
  <div class="header-left">
    <img src="logo.png" class="logo">
    <div class="title-block">
      <h1>411 Pack</h1>
      <div class="subtitle">Investor Command Terminal</div>
    </div>
  </div>
  <div class="status">● LIVE</div>
</div>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="panel left">

    <label>INPUT</label>

    <input id="address" placeholder="Street, City, State, Zip">

    <select id="propertyType">
      <option>Residential (1-4 units)</option>
      <option>Multifamily 5+</option>
      <option>Commercial</option>
      <option>Land</option>
    </select>

    <select id="mode">
      <option value="full">Full Report</option>
      <option value="comps">Comps Only</option>
    </select>

    <input id="notes" placeholder="Optional context">

    <div class="button-row">
      <button class="run" onclick="generate()">RUN</button>
      <button class="copy" onclick="copyText()">COPY</button>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel right">

    <div class="output-header">
      <span>OUTPUT</span>
      <span class="ready" id="statusText">READY</span>
    </div>

    <div id="output" class="output-box">Ready...</div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
