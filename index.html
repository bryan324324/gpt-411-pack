<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capital Funds Services LLC – 411 Pack</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: radial-gradient(circle at top, #0b1e35, #020617);
  color: white;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 24px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 50px;
}

.logo-img {
  height: 48px;
  width: auto;
  object-fit: contain;

  transform: translateY(2px);

  filter:
    drop-shadow(0 10px 25px rgba(0,0,0,0.6))
    brightness(1.05)
    contrast(1.05);
}

h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: -0.3px;
}

.subtitle {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 4px;
}

/* CARD */
.card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;

  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  padding: 30px;

  backdrop-filter: blur(12px);
}

/* INPUTS */
label {
  font-size: 13px;
  color: #9ca3af;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  margin-bottom: 18px;

  background: #020617;
  border: 1px solid #1f2937;
  border-radius: 10px;

  color: white;
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 12px;
}

button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

.run {
  background: #facc15;
  color: black;
}

.copy {
  background: #3b82f6;
  color: white;
}

/* OUTPUT */
.output {
  background: #020617;
  border-radius: 12px;
  padding: 20px;
  white-space: pre-wrap;
  min-height: 260px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo.png" class="logo-img">
    <div>
      <h1>Capital Funds Services LLC</h1>
      <div class="subtitle">411 Pack – Property Intelligence Tool</div>
    </div>
  </div>

  <div class="card">

    <div>
      <label>Property Address</label>
      <input id="address" placeholder="Enter full property address">

      <label>Property Type</label>
      <select id="propertyType">
        <option>Residential (1-4 units)</option>
        <option>Multifamily 5+</option>
        <option>Commercial</option>
        <option>Land</option>
      </select>

      <label>Mode</label>
      <select id="mode">
        <option value="full">Full Report</option>
        <option value="comps">Comps Only</option>
      </select>

      <label>Notes</label>
      <input id="notes" placeholder="Optional">

      <div class="actions">
        <button class="run" onclick="generate()">Run Report</button>
        <button class="copy" onclick="copyText()">Copy</button>
      </div>
    </div>

    <div>
      <div style="margin-bottom:10px;color:#94a3b8;">Generated Command</div>
      <div id="output" class="output">Ready...</div>
    </div>

  </div>

</div>

<script>
function generate() {
  const address = document.getElementById("address").value.trim();
  const type = document.getElementById("propertyType").value;
  const mode = document.getElementById("mode").value;
  const notes = document.getElementById("notes").value.trim();

  if (!address) {
    setOutput("Enter a property address.");
    return;
  }

  let command = `Property search: ${address}\n`;
  command += `Property type: ${type.toLowerCase()}\n\n`;

  if (mode === "full") {
    command += `Pull full report + PA + taxes + comps.\n`;
  }

  if (mode === "comps") {
    command += `Run comps only.\n`;
  }

  if (notes) {
    command += `\nNotes: ${notes}`;
  }

  setOutput(command);
}

function setOutput(text) {
  document.getElementById("output").innerText = text;
}

function copyText() {
  const output = document.getElementById("output").innerText;
  if (!output) return;

  navigator.clipboard.writeText(output);

  const btn = document.querySelector(".copy");
  const original = btn.innerText;

  btn.innerText = "Copied ✓";

  setTimeout(() => {
    btn.innerText = original;
  }, 1200);
}
</script>

</body>
</html>
