<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bryan's Property Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">

    <div class="header-left">
      <img src="logo.png" class="logo">
    </div>

    <div class="header-center">
      <div class="brand">Bryan's Property Analyzer</div>
    </div>

    <div class="header-right">
      <div class="status">
        <span class="dot"></span> LIVE
      </div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT PANEL -->
    <div class="panel left">

      <div class="label">INPUT</div>

      <input id="address" placeholder="Street, City, State, Zip">

      <select id="type">
        <option>Residential (1-4 units)</option>
        <option>Multifamily 5+</option>
        <option>Commercial</option>
        <option>Land</option>
      </select>

      <select id="mode">
        <option>Full Report</option>
        <option>Comps Only</option>
      </select>

      <input id="notes" placeholder="Optional context">

      <div class="buttons">
        <button class="run" onclick="run()">RUN</button>
        <button class="copy" onclick="copy()">COPY</button>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="panel right">

      <div class="label">OUTPUT</div>

      <pre id="output">Ready...</pre>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
