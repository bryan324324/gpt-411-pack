<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capital Funds Services LLC – 411 Pack</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">411</div>
    <div>
      <h1>Capital Funds Services LLC</h1>
      <p class="subtitle">411 Pack – Property Intelligence Tool</p>
    </div>
  </div>

  <div class="card">

    <label>Property Address</label>
    <input id="address" placeholder="Enter full property address">

    <label>Property Type</label>
    <select id="propertyType">
      <option>Residential (1-4 units)</option>
      <option>Multifamily 5+</option>
      <option>Commercial</option>
      <option>Land</option>
    </select>

    <label>Mode</label>
    <select id="mode">
      <option value="full">Full Report</option>
      <option value="comps">Comps Only</option>
    </select>

    <label>Notes (optional)</label>
    <input id="notes" placeholder="ex: buyer targeting 480K">

    <div class="button-row">
      <button class="run" onclick="runNow()">Run Now</button>
      <button class="copy" onclick="copyCommand()">Copy</button>
    </div>

    <textarea id="output" placeholder="Command will appear here"></textarea>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
