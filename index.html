<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>411 Pack</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="ambient"></div>

<div class="wrapper">

  <div class="header">
    <img src="logo.png" class="logo">

    <div class="header-text">
      <div class="title">411 Pack</div>
      <div class="subtitle">Investor Command Terminal</div>
    </div>

    <div class="live">
      <span class="pulse"></span> LIVE
    </div>
  </div>

  <div class="grid">

    <div class="panel">

      <div class="label">INPUT</div>

      <input id="address" placeholder="Street, City, State, Zip">

      <div class="row">
        <select id="propertyType">
          <option>Residential (1-4 units)</option>
          <option>Multifamily 5+</option>
          <option>Commercial</option>
          <option>Land</option>
        </select>

        <select id="mode">
          <option value="full">Full Report</option>
          <option value="comps">Comps Only</option>
        </select>
      </div>

      <input id="notes" placeholder="Optional context">

      <div class="buttons">
        <button class="run" onclick="generate()">RUN</button>
        <button class="copy" onclick="copyText()">COPY</button>
      </div>

    </div>

    <div class="panel terminal">

      <div class="label">OUTPUT</div>

      <div class="terminal-header">
        <span>Structured Execution</span>
        <span id="status">READY</span>
      </div>

      <div id="output">Ready...</div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
