<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Capital Funds Services LLC — 411 Pack</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">411</div>
    <div>
      <h1>Capital Funds Services LLC</h1>
      <p class="subtitle">411 Pack – Property Intelligence Tool</p>
    </div>
  </div>

  <div class="grid">

    <div class="card">

      <label>Property Address</label>
      <input id="address" placeholder="Enter full property address">

      <label>Property Type</label>
      <select id="propertyType">
        <option>Residential (1-4 units)</option>
        <option>Multifamily 5+</option>
        <option>Commercial</option>
        <option>Land</option>
      </select>

      <label>Mode</label>
      <select id="mode">
        <option value="full">Full Report</option>
        <option value="comps">Comps Only</option>
      </select>

      <label>Notes</label>
      <input id="notes" placeholder="Optional">

      <div class="buttons">
        <button class="run" onclick="generate()">Run Report</button>
        <button class="copy" onclick="copyText()">Copy</button>
      </div>

    </div>

    <div class="output-card">
      <div class="output-title">Generated Command</div>
      <pre id="output">Ready...</pre>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
