<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Capital Funds Services LLC – 411 Pack</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">411</div>
    <div>
      <h1>Capital Funds Services LLC</h1>
      <p class="subtitle">411 Pack – Property Intelligence Tool</p>
    </div>
  </div>

  <div class="card">

    <div class="grid">

      <!-- LEFT -->
      <div class="panel">

        <label>Property Address</label>
        <input id="address" placeholder="Enter full address (Street, City, State, Zip)">

        <label>Property Type</label>
        <select id="propertyType">
          <option>Residential (1-4 units)</option>
          <option>Multifamily 5+</option>
          <option>Commercial</option>
          <option>Land</option>
        </select>

        <label>Mode</label>
        <select id="mode">
          <option value="full">Full Report</option>
          <option value="comps">Comps Only</option>
        </select>

        <label>Notes</label>
        <input id="notes" placeholder="Optional">

        <div class="buttons">
          <button class="run" onclick="generate()">Run Report</button>
          <button class="copy" onclick="copyText()">Copy</button>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="panel output-panel">

        <div class="output-header">
          Generated Command
        </div>

        <div id="output" class="output">
          Ready...
        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
