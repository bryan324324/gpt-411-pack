<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>411 Pack — Investor Terminal</title>

  <!-- Premium fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo-wrap">
      <img src="logo.png" class="logo" />
    </div>

    <div class="title-block">
      <h1>411 Pack</h1>
      <p>Investor Command Terminal</p>
    </div>

    <div class="status">● LIVE</div>
  </header>

  <!-- MAIN -->
  <main class="grid">

    <!-- INPUT -->
    <section class="card">
      <div class="card-label">INPUT</div>

      <input id="address" placeholder="Street, City, State, Zip" />

      <div class="row">
        <select id="propertyType">
          <option>Residential (1-4 units)</option>
          <option>Multifamily 5+</option>
          <option>Commercial</option>
          <option>Land</option>
        </select>

        <select id="mode">
          <option value="full">Full Report</option>
          <option value="comps">Comps Only</option>
        </select>
      </div>

      <input id="notes" placeholder="Optional context" />

      <div class="buttons">
        <button class="run" onclick="generate()">RUN</button>
        <button class="copy" onclick="copyText()">COPY</button>
      </div>

      <div class="hotkeys">
        ENTER = Run • SHIFT+ENTER = Launch ChatGPT
      </div>

      <!-- HISTORY -->
      <div class="history">
        <div class="history-title">Command History</div>
        <ul id="historyList"></ul>
      </div>

    </section>

    <!-- OUTPUT -->
    <section class="card">
      <div class="card-label">OUTPUT</div>

      <div class="output-header">
        <span>Structured Execution READY</span>
        <span class="ready">READY</span>
      </div>

      <pre id="output">Ready...</pre>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
