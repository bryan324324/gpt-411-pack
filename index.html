<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capital Funds Services LLC — 411 Pack</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* BACKGROUND */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: radial-gradient(circle at top, #0f172a, #020617 60%);
  color: white;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 80px 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 50px;
}

.logo {
  background: linear-gradient(135deg, #facc15, #eab308);
  color: black;
  font-weight: 800;
  font-size: 22px;
  padding: 16px 18px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(250,204,21,0.3);
}

h1 {
  margin: 0;
  font-size: 30px;
}

.subtitle {
  margin: 0;
  color: #94a3b8;
  font-size: 14px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}

/* CARDS */
.card, .output-card {
  background: rgba(15, 23, 42, 0.6);
  border-radius: 20px;
  padding: 28px;
  backdrop-filter: blur(18px);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* OUTPUT */
.output-card {
  background: rgba(2, 6, 23, 0.85);
}

.output-title {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 10px;
}

pre {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.7;
}

/* INPUTS */
label {
  margin-top: 16px;
  font-size: 12px;
  color: #94a3b8;
  display: block;
}

input, select {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  background: #020617;
  color: white;
  margin-top: 6px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 14px;
  margin-top: 26px;
}

button {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-weight: 700;
  cursor: pointer;
}

.run {
  background: linear-gradient(135deg, #facc15, #eab308);
  color: black;
}

.copy {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
}

</style>

</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">411</div>
    <div>
      <h1>Capital Funds Services LLC</h1>
      <p class="subtitle">411 Pack – Property Intelligence Tool</p>
    </div>
  </div>

  <div class="grid">

    <div class="card">

      <label>Property Address</label>
      <input id="address" placeholder="Enter property address">

      <label>Property Type</label>
      <select id="type">
        <option>Residential (1-4 units)</option>
        <option>Multifamily 5+</option>
        <option>Commercial</option>
        <option>Land</option>
      </select>

      <label>Mode</label>
      <select id="mode">
        <option value="full">Full Report</option>
        <option value="comps">Comps Only</option>
      </select>

      <label>Notes</label>
      <input id="notes">

      <div class="buttons">
        <button class="run" onclick="generate()">Run Report</button>
        <button class="copy" onclick="copyCmd()">Copy</button>
      </div>

    </div>

    <div class="output-card">
      <div class="output-title">Generated Command</div>
      <pre id="out">Ready...</pre>
    </div>

  </div>

</div>

<script>

function generate() {
  let a = document.getElementById("address").value.trim();
  let t = document.getElementById("type").value;
  let m = document.getElementById("mode").value;
  let n = document.getElementById("notes").value.trim();

  if (!a) {
    set("Enter address");
    return;
  }

  a = a.toUpperCase();

  if (!/\d{5}$/.test(a)) {
    set("Must include ZIP");
    return;
  }

  let c = `Property search: ${a}\n`;
  c += `Property type: ${t.toLowerCase()}\n\n`;

  if (m === "full") {
    c += `Pull full report + PA + taxes + comps.\n`;
  } else {
    c += `Run comps only.\n`;
  }

  if (n) c += `\nNotes: ${n}`;

  set(c);

  window.open("https://chat.openai.com/?q=" + encodeURIComponent(c), "_blank");
}

function set(t) {
  document.getElementById("out").innerText = t;
}

function copyCmd() {
  let t = document.getElementById("out").innerText;
  navigator.clipboard.writeText(t);

  let b = document.querySelector(".copy");
  b.innerText = "Copied ✓";
  setTimeout(()=>b.innerText="Copy",1000);
}

document.addEventListener("keydown", e=>{
  if(e.key==="Enter") generate();
});

</script>

</body>
</html>
