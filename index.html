<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>411 Pack</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <img src="logo.png" class="logo">

    <div class="brand">
      <div class="title">411</div>
      <div class="subtitle">Investor Terminal</div>
    </div>

    <div class="status">LIVE</div>
  </header>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- INPUT -->
    <div class="panel">
      <div class="panel-title">INPUT</div>

      <input id="address" placeholder="Street, City, State, Zip">

      <div class="row">
        <select id="propertyType">
          <option>Residential (1-4 units)</option>
          <option>Multifamily 5+</option>
          <option>Commercial</option>
          <option>Land</option>
        </select>

        <select id="mode">
          <option value="full">Full Report</option>
          <option value="comps">Comps Only</option>
        </select>
      </div>

      <input id="notes" placeholder="Optional context">

      <div class="actions">
        <button class="run" onclick="generate()">RUN</button>
        <button class="copy" onclick="copyText()">COPY</button>
      </div>

    </div>

    <!-- OUTPUT -->
    <div class="panel">
      <div class="panel-title">OUTPUT</div>

      <pre id="output">Ready...</pre>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
