<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>411 Pack</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" class="logo">
    <div class="header-right">
      <div class="title">411 Pack</div>
      <div class="subtitle">Property intelligence workflow for high-conviction analysis.</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- LEFT PANEL -->
    <div class="card">

      <div class="section-title">Search Controls</div>

      <label>Property Address</label>
      <input id="address" placeholder="Street, City, State, Zip">

      <div class="row">
        <div>
          <label>Property Type</label>
          <select id="propertyType">
            <option>Residential (1-4 units)</option>
            <option>Multifamily 5+</option>
            <option>Commercial</option>
            <option>Land</option>
          </select>
        </div>

        <div>
          <label>Mode</label>
          <select id="mode">
            <option value="full">Full Report</option>
            <option value="comps">Comps Only</option>
          </select>
        </div>
      </div>

      <label>Notes</label>
      <input id="notes" placeholder="Optional context or target price">

      <div class="button-row">
        <button class="run" onclick="generate()">Run Report</button>
        <button class="copy" onclick="copyText()">Copy</button>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="card output">

      <div class="section-title">Generated Command</div>

      <div id="output">Ready...</div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
